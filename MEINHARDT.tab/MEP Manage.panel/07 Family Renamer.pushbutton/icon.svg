<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0d6efd" />
      <stop offset="100%" stop-color="#1976d2" />
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" rx="32" ry="32" fill="url(#bg)" />

  <!-- Large MHT letters -->
  <g text-anchor="middle" fill="#ffffff">
    <text x="50%" y="50%" font-family="Segoe UI, Arial, Helvetica, sans-serif" font-size="92" font-weight="700">MHT</text>
    <text x="50%" y="82%" font-family="Segoe UI, Arial, Helvetica, sans-serif" font-size="18" font-weight="600">Family Renamer</text>
    <text x="50%" y="92%" font-family="Segoe UI, Arial, Helvetica, sans-serif" font-size="12" font-weight="400">gmtools</text>
  </g>

  <!-- subtle inner shadow -->
  <ellipse cx="128" cy="220" rx="70" ry="8" fill="#000" opacity="0.06" />
